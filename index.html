<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEXBOX</title>
    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
            height: 300px;
            align-content: space-around;
            border: 2px solid black;
        }
        .item {
            flex: 1 1 200px;
            margin: 10px;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: lightblue;
            text-align: center;
        }
        .block-box { 
            display: block; 
            margin-top: 20px;
            padding: 10px;  
            background: lightgreen;
            border: 1px solid black;
        }
        .inline-box {
            display: inline; 
            margin-top: 20px;
            padding: 10px;
            background: lightcoral;
            border: 1px solid black;
        }
        .flex-box { 
            display: flex; 
            flex-wrap: wrap;
            margin-top: 20px;
            padding: 10px;
            background: lightblue;
            border: 1px solid black;
        }
        .flex-container {
            display: flex;
            justify-content: space-between;
            align-items: center; 
            height: 200px;  
            margin-top: 20px;
            padding: 10px;
            border: 2px solid black;
        }
        .flex-direction.flex-flow{
            flex-direction: column;
            flex-flow: row wrap;
        }
        .flex-container.practical {
            display: flex;
            margin-top: 20px;
            height: 100px;
            border: 2px solid black;
        }

        .grow {
            flex: 1 1 40%; /* растёт, базовая ширина 40% */
            background: lightcoral;
            text-align: center;
        }

        .auto {
            flex: 2 1 auto; 
            background: lightgreen;
            text-align: center;
        }

        .fixed {
            flex: 0 0 100px; 
            background: lightblue;
            text-align: center;
        }
        .menu {
            display: flex;
            justify-content: center;  
            align-items: center;      
            background: #333;
            padding: 10px;
            margin-top: 20px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            padding: 5px 10px;
            border-radius: 5px;
        }
        .menu a:hover {
            background: #555;
        }   
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">Item 1</div>
        <div class="item item2">Item 2</div>
        <div class="item item3">Item 3</div>
        <div class="item item4">Item 4</div>
        <div class="item item5">Item 5</div>
        <div class="item item6">Item 6</div>
    </div>
    <div>
        <div class="block-box">Block</div>
        <div class="inline-box">Inline</div>
        <div class="flex-box">Flex</div>
    </div>
    <div class="flex-container">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
    <div class="flex-container flex-direction">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
    <div class="flex-container flex-flow">
        <div>1</div>
        <div>2</div>
        <div>3</div>
    </div>
    <div class="flex-container practical">
        <div class="grow">50%</div>
        <div class="auto">расширяется</div>
        <div class="fixed">100px</div>
    </div>
    <nav class="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</body>
</html>
